services:
  deluge:
    image: linuxserver/deluge:${VERSION:-latest}
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./core.conf:/config/core.conf:ro
    ports:
      - ${HOST_PORT:-8112}:8112
    tmpfs:
      - /config
      - /downloads
      - /home/deluge
      - /root/Downloads

networks:
  default:
    name: ${NETWORK_NAME:-electorrent_p2p}
    external: true
