services:
  rtorrent:
    image: linuxserver/rutorrent:${VERSION:-latest}
    ports:
      - ${HOST_PORT:-8080}:80
      - ${RPC_PORT:-5000}:5000
      - ${PEER_PORT:-51413}:51413
      - ${PEER_UDP_PORT:-6881}:6881/udp
    tmpfs:
      - /downloads
      - /config

networks:
  default:
    name: ${NETWORK_NAME:-electorrent_p2p}
    external: true
