# Shared test stack used by ElectorrentTestService.
# Each WebdriverIO client capability runs this stack as its own compose project.
x-peer: &peer
  build: ./shared/opentracker/peer
  volumes:
    - ./shared/opentracker/data/shared:/shared
  tmpfs:
    - /srv
  entrypoint: ["tail", "-f", "/dev/null"]

services:
  # Opentracker (http://erdgeist.org/arts/software/opentracker/)
  # A local torrent tracker used in an ad-hoc torrent network to test
  # with real P2P traffic.
  tracker:
    hostname: tracker
    init: true
    build: ./shared/opentracker/tracker
    ports:
      - ${TRACKER_PORT:-6969}:6969
      - ${TRACKER_PORT:-6969}:6969/udp
    networks:
      default:
        aliases:
          - tracker-one.test
          - tracker-two.test
          - tracker-three.test

  # Peer nodes in the P2P network
  peer:
    <<: *peer
    hostname: peer

  nginx:
    build: ./shared/nginx
    ports:
      - ${NGINX_HOST_PORT:-8443}:443
      - ${NGINX_AUTH_HOST_PORT:-8081}:${NGINX_AUTH_PORT:-8081}
    environment:
      - PROXY_HOST=${PROXY_HOST}
      - PROXY_PORT=${PROXY_PORT}
      - NGINX_AUTH_PORT=${NGINX_AUTH_PORT:-8081}

  deluge:
    image: linuxserver/deluge:${VERSION:-latest}
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./clients/deluge/core.conf:/config/core.conf:ro
    ports:
      - ${CLIENT_HOST_PORT:-8112}:8112
    tmpfs:
      - /config
      - /downloads
      - /home/deluge
      - /root/Downloads

  qbittorrent:
    image: linuxserver/qbittorrent:${VERSION:-latest}
    ports:
      - ${CLIENT_HOST_PORT:-8080}:8080
    environment:
      - WEBUI_PORT=8080
    volumes:
      - ./clients/qbittorrent/qBittorrent.conf:/defaults/qBittorrent.conf
    tmpfs:
      - /downloads

  rtorrent:
    image: linuxserver/rutorrent:${VERSION:-latest}
    ports:
      - ${CLIENT_HOST_PORT:-8080}:80
      - ${RPC_PORT:-5000}:5000
      - ${PEER_PORT:-51413}:51413
      - ${PEER_UDP_PORT:-6881}:6881/udp
    tmpfs:
      - /downloads
      - /config

  rtorrent-crazymax:
    image: crazymax/rtorrent-rutorrent:5.3.1-0.16.13
    ports:
      - ${CLIENT_HOST_PORT:-8080}:8080
      - ${RPC_PORT:-8000}:8000
      - ${PEER_PORT:-50000}:50000
      - ${PEER_UDP_PORT:-6881}:6881/udp
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - RT_INC_PORT=50000
      - RT_DHT_PORT=6881
      - WAN_IP_CMD=hostname -i
    volumes:
      - ./clients/rtorrent-crazymax/.rtorrent.rc:/data/rtorrent/.rtorrent.rc
      - rtorrent-crazymax-data:/data
    tmpfs:
      - /downloads
      - /passwd

  transmission:
    image: linuxserver/transmission:${VERSION:-latest}
    environment:
      - USER=username
      - PASS=password
    ports:
      - ${CLIENT_HOST_PORT:-9091}:9091
    tmpfs:
      - /downloads
      - /downloads/complete
      - /downloads/incomplete

  utorrent:
    image: ekho/utorrent:${VERSION:-latest}
    ports:
      - ${CLIENT_HOST_PORT:-8080}:8080
    tmpfs:
      - /data:uid=1001,gid=1001

volumes:
  rtorrent-crazymax-data:
