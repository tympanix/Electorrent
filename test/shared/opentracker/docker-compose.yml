# Common configuration for a peer in the p2p network
x-peer: &peer
  build: peer
  networks:
    - p2p
  volumes:
    - ./data/shared:/shared
  tmpfs:
    - /srv
  entrypoint: ["/start"]

services:
  # Opentracker (http://erdgeist.org/arts/software/opentracker/)
  # A local torrent tracker used in an ad-hoc torrent network to test
  # with real P2P traffic.
  tracker:
    hostname: tracker
    init: true
    build: tracker
    ports:
      - 6969:6969
      - 6969:6969/udp
    networks:
      - p2p

  # Peer nodes in the P2P network
  peer1:
    <<: *peer
    hostname: peer1
    command: ["--torrent-name", "slow", "--upload-speed", "1", "--download-speed", "1", "--file-size", "100"]

  peer2:
    <<: *peer
    hostname: peer2
    command: ["--torrent-name", "fast", "--file-size", "10"]

volumes:
  shared:
    driver_opts:
      type: tmpfs
      device: tmpfs

networks:
  p2p:
    name: electorrent_p2p