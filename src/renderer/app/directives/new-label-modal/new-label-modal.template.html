<form modal
    size="tiny"
    approve="approve()"
    ng-submit="applyAndClose()"
    id="newLabelModal">
    <i class="close icon"></i>
    <div class="header">
        New Label
    </div>
    <div class="content">
        <div class="ui form">
            <div class="field">
                <div class="ui fluid left icon input">
                    <i class="tag icon"></i>
                    <input type="text" name="label" maxlength="36" ng-model="data.label" placeholder="Label Name">
                </div>
            </div>
        </div>
    </div>
    <div class="actions">
        <button type="button" class="ui black deny button">
            Cancel
        </button>
        <button
            type="submit"
            class="ui green right labeled icon button"
            ng-class="{ disabled: !data.label }"
            ng-disabled="!data.label">
            Apply Label
            <i class="tag icon"></i>
        </button>
    </div>
</form>
