<div id="notifications" class="notifications container">
    <div class="animated notification" ng-repeat="notification in notifications">
        <div class="ui message" ng-class="notification.type">
            <i class="close icon" ng-click="close($index)"></i>
            <div class="header">
                {{notification.title}}
            </div>
            <p>{{notification.message}}</p>
        </div>
    </div>
</div>

<update-modal data="updateData" approve="installUpdate()"></update-modal>

<certificate-modal
    approve="installCertificate()"
    after="certificateResult"
    data="certificate">
</certificate-modal>
