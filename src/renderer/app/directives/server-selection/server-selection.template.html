<div id="page-server-selection" class="wrapper">
    <div class="ui middle aligned center aligned grid" style="height: 100%;">
        <div class="narrow column">
            <h2 class="ui image header">
                <div class="content">
                    Connect to Server
                </div>
            </h2>

            <div class="ui one fluid cards server list">
                <div class="card" ng-repeat="server in servers">
                    <div class="content">
                        <div class="header">
                            <i class="red exclamation triangle icon" ng-if="!server.isClientKnown()" title="{{server.getClientWarning()}}"></i>
                            <i class="torrent icon" ng-if="server.isClientKnown()" ng-class="server.getIcon()"></i>
                            {{server.getName()}}
                        </div>
                        <div class="meta">
                            {{server.getNameAtAddress()}}
                        </div>
                    </div>
                    <div class="ui bottom attached green button" ng-click="connectToServer({ server: server })">
                        Connect
                        <i class="icon right arrow"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
