<modal
    size="small"
    approve="approve()"
    id="updateModal"
    ng-ref="modalRef">
    <i class="close icon"></i>
    <div class="header">
        Update Available
    </div>
    <div class="content">
        <h4 class="ui header">
            <div class="content">
                Version:
                {{data.releaseName}}
                <div class="sub header">{{data.releaseDate | releaseDate}}</div>
            </div>
        </h4>

        <h4 class="ui horizontal divider header" style="margin-top: 14px">
            <i class="tag icon"></i>
            Release Notes
        </h4>

        <p marked="data.releaseNotes"></p>
    </div>
    <div class="actions">
        <button type="button" class="ui black deny button">
            Update Later
        </button>
        <button type="button" class="ui green right labeled icon approve button">
            Quit And Install
            <i class="arrow alternate circle up icon"></i>
        </button>
    </div>
</modal>
