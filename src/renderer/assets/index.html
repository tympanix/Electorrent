<!DOCTYPE html>
<html ng-app="torrentApp">
    <head app-theme>
        <meta charset="UTF-8">
        <title>Electorrent</title>

        <link rel="stylesheet" href="css/themes/light.css">
        <link rel="stylesheet" ng-href="css/themes/{{theme}}.css">

        <!-- build:css css/vendor.css -->
        <link rel="stylesheet" href="../../../node_modules/angular-table-resize/dist/angular-table-resize.min.css">
        <!-- endbuild -->
    </head>
    <body ready-broadcast>
        <app-shell></app-shell>

        <!-- Dependencies -->

        <!-- Insert this line above script imports  -->
        <script>
            if (typeof module === 'object') {
                window.module = module;
                module = undefined;
            }
        </script>

        <!-- build:js ./scripts/vendor.js -->
        <script src="../../../node_modules/jquery/dist/jquery.min.js"></script>
        <script src="../../../node_modules/angular/angular.js" charset="utf-8"></script>
        <script src="../../../node_modules/angular-resource/angular-resource.min.js" charset="utf-8"></script>
        <script src="../../../node_modules/angular-animate/angular-animate.js" charset="utf-8"></script>
        <script src="../../../node_modules/angular-table-resize/dist/angular-table-resize.js" charset="utf-8"></script>
        <script src="../app/vendor/ng-infinite-scroll.js" charset="utf-8"></script>
        <script src="../../../node_modules/moment/moment.js" charset="utf-8"></script>
        <script src="../../../node_modules/semantic-ui-css/semantic.min.js" charset="utf-8"></script>
        <script src="../../../node_modules/marked/lib/marked.js" charset="utf-8"></script>
        <script src="../../../node_modules/angular-marked/dist/angular-marked.js" charset="utf-8"></script>
        <script src="../../../node_modules/jquery-ui-dist/jquery-ui.js" charset="utf-8"></script>
        <script src="../../../node_modules/angular-ui-sortable/dist/sortable.js" charset="utf-8"></script>
        <script src="../../../node_modules/underscore/underscore.js" charset="utf-8"></script>
        <script src="../../../node_modules/base64-js/base64js.min.js" charset="utf-8"></script>
        <script src="../../../node_modules/fuse.js/dist/fuse.js" charset="utf-8"></script>
        <script src="../../../node_modules/mousetrap/mousetrap.js" charset="utf-8"></script>
        <!-- endbuild -->

        <!-- Insert this line after script imports -->
        <script>
            if (window.module)
                module = window.module;
        </script>

        <!-- Application bundle -->
        <script src="app.js" charset="utf-8"></script> 

        <!-- build:dev -->
        <!-- Connect to server process -->
        <script>
            try {
                const isDev = require('./lib/electorrent').isDevelopment()
                if (isDev) {
                    require('electron-connect').client.create()
                }
            } catch (e) {
                console.error("Development environment failed", e)
            }
        </script>
        <!-- end:build -->
    </body>
</html>
