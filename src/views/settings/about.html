<!DOCTYPE html>
<h1>About</h1>

<div class="ui grid">
  <div class="eight wide column">
      <h2 class="ui center aligned icon header">
        <i class="trophy icon" aria-hidden="true"></i>
        <div class="content">
          Application Version
          <div class="sub header">{{appVersion}}</div>
        </div>
      </h2>
  </div>
  <div class="eight wide column">
      <h2 class="ui center aligned icon header">
        <i class="code icon" aria-hidden="true"></i>
        <div class="content">
          Node Version
          <div class="sub header">{{nodeVersion}}</div>
        </div>
      </h2>
  </div>
  <div class="eight wide column">
      <h2 class="ui center aligned icon header">
        <i class="chrome icon" aria-hidden="true"></i>
        <div class="content">
          Chrome Version
          <div class="sub header">{{chromeVersion}}</div>
        </div>
      </h2>
  </div>
  <div class="eight wide column">
      <h2 class="ui center aligned icon header">
        <i class="hashtag icon" aria-hidden="true"></i>
        <div class="content">
          Electron Version
          <div class="sub header">{{electronVersion}}</div>
        </div>
      </h2>
  </div>
</div>
